# ── Exception wildcards ───────────────────────────────────────────────────────
# These statuses are valid as a next status from ANY non-terminal status in ANY flow.
# Expanded into the adjacency map at compile time — not enumerated as N×7 edges.
wildcard_targets:
  - DAMAGED
  - MIS_ROUTED
  - REROUTED
  - EXCESS_INSCAN
  - PINCODE_AUDITED
  - WEIGHT_AUDITED
  - MODE_AUDITED

# ── Initial statuses ──────────────────────────────────────────────────────────
# Valid first statuses for new shipments. Used by ValidateInitial().
# No prior status exists; Validate() must not be called.
initial_statuses:
  - code: DRAFT
    flow: FORWARD

# ── Transitions ───────────────────────────────────────────────────────────────
transitions:
  # Pre-Mile / Booking
  - from: DRAFT
    to: [BOOKED, CANCELLED, REJECTED, REJECTED_BY_HO]
    flow: FORWARD

  - from: BOOKED
    to: [PART_PAYMENT_PENDING, UPDATED_BOOKING, MANIFESTED, CANCELLED]
    flow: FORWARD

  - from: PART_PAYMENT_PENDING
    to: [BOOKED, CANCELLED]
    flow: FORWARD

  - from: UPDATED_BOOKING
    to: [MANIFESTED, CANCELLED]
    flow: FORWARD

  - from: MANIFESTED
    to: [READY_FOR_PICKUP, CANCELLED]
    flow: FORWARD

  # First Mile
  - from: READY_FOR_PICKUP
    to: [INSCANNED, HUB-IN-SCANNED]
    flow: FORWARD

  # Middle Mile — normal
  - from: INSCANNED
    to: [HUB-IN-SCANNED, BAGGED, BAG_CREATED, INSCANNED_AT_TRANSIT, OUT_SCAN_TO_CP, OUT_SCAN_TO_3PL]
    flow: FORWARD

  - from: HUB-IN-SCANNED
    to: [BAGGED, BAG_CREATED, HUB-OUTSCAN, REMOVED_FROM_BAG, REMOVED_FROM_LCR]
    flow: FORWARD

  - from: HUB-OUTSCAN
    to: [INSCANNED_AT_TRANSIT, INSCANNED_AT_CP, IN-BAG-INSCAN, OUT_SCAN_TO_CP, OUT_SCAN_TO_3PL]
    flow: FORWARD

  - from: BAGGED
    to: [BAG_FINALISED, REMOVED_FROM_BAG, IN-BAG-OUTSCAN, IN_BAG_OUTSCAN_TO_CP]
    flow: FORWARD

  - from: BAG_CREATED
    to: [BAG_FINALISED, BAG_DELETED]
    flow: FORWARD

  - from: BAG_FINALISED
    to: [IN-BAG-OUTSCAN, IN_BAG_OUTSCAN_TO_CP]
    flow: FORWARD

  - from: INSCANNED_AT_TRANSIT
    to: [HUB-OUTSCAN, HUB-IN-SCANNED, BAGGED]
    flow: FORWARD

  # Middle Mile — FORCE_* override edges
  # Reviewers: these are intentional override edges, not spec errors.
  - from: HUB-IN-SCANNED
    to: FORCE_HUB_OUTSCAN
    flow: FORWARD
    is_override: true
    requires_context: [operator_id]

  - from: BAGGED
    to: FORCE_BAG
    flow: FORWARD
    is_override: true
    requires_context: [operator_id]

  - from: FORCE_BAG
    to: FORCE_BAG_ATTEMPTED
    flow: FORWARD
    is_override: true
    requires_context: [operator_id]

  - from: HUB-OUTSCAN
    to: FORCE_OUTSCAN_TO_CP
    flow: FORWARD
    is_override: true
    requires_context: [operator_id]

  # Last Mile
  - from: INSCANNED_AT_CP
    to: [SCHEDULED_FOR_TRIP, OUT_FOR_DELIVERY]
    flow: FORWARD

  - from: SCHEDULED_FOR_TRIP
    to: [OUT_FOR_DELIVERY, REMOVED_FROM_LCR]
    flow: FORWARD

  - from: OUT_FOR_DELIVERY
    to: [DELIVERED, ATTEMPTED, UNDELIVERED]
    flow: FORWARD

  - from: ATTEMPTED
    to: [OUT_FOR_DELIVERY, UNDELIVERED, RETURN_INITIATED]
    flow: FORWARD

  - from: UNDELIVERED
    to: [OUT_FOR_DELIVERY, RETURN_INITIATED, INSCANNED_AT_CP]
    flow: FORWARD

  # RTO / Reverse
  - from: RETURN_INITIATED
    to: [RTO, RETURN_REVOKED]
    flow: REVERSE

  - from: RETURN_REVOKED
    to: [OUT_FOR_DELIVERY]
    flow: FORWARD

  - from: RTO
    to: [RTO_OUT_FOR_DELIVERY, HUB-IN-SCANNED, INSCANNED]
    flow: REVERSE

  - from: RTO_OUT_FOR_DELIVERY
    to: [RTO_DELIVERED, RTO_UNDELIVERED]
    flow: REVERSE

  - from: RTO_UNDELIVERED
    to: [RTO_OUT_FOR_DELIVERY, HUB-IN-SCANNED]
    flow: REVERSE

  # 3PL
  - from: OUT_SCAN_TO_3PL
    to: [3PL_ITEM_BOOK, 3PL_BAG_CLOSE]
    flow: FORWARD

  - from: 3PL_ITEM_BOOK
    to: [3PL_ITEM_DELIVERY, 3PL_ITEM_ONHOLD, 3PL_ITEM_REDIRECT, 3PL_ITEM_RETURN]
    flow: FORWARD

  - from: 3PL_BAG_CLOSE
    to: [3PL_BAG_DISPATCH, 3PL_BAG_OPEN]
    flow: FORWARD

  # 3PL_BAG_DISPATCH → 3PL_BAG_OPEN models inbound receipt at a downstream 3PL hub.
  # This is NOT a loop — it represents the bag arriving and being opened at the next
  # facility. Reviewers: this edge is intentional.
  - from: 3PL_BAG_DISPATCH
    to: [3PL_BAG_OPEN]
    flow: FORWARD

  - from: 3PL_BAG_OPEN
    to: [3PL_ITEM_BOOK]
    flow: FORWARD

  - from: 3PL_ITEM_ONHOLD
    to: [3PL_ITEM_BOOK, 3PL_ITEM_RETURN]
    flow: FORWARD

  - from: 3PL_ITEM_REDIRECT
    to: [3PL_ITEM_BOOK, 3PL_ITEM_DELIVERY]
    flow: FORWARD

  - from: 3PL_ITEM_RETURN
    to: [INSCANNED, HUB-IN-SCANNED]
    flow: REVERSE
