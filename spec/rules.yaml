spec_version: "1.0.0"
spec_date: "2026-03-24"

# Status IDs are 0-indexed in the spec.
# The Go library adds +1 so that Go Status(0) is always the zero/uninitialized sentinel.
# IDs must never be renumbered — they are a stable wire contract.

